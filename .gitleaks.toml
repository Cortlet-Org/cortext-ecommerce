title = "Cortext Secret Scan"

[extend]
useDefault = true

[[rules]]
description = "Private Keys"
regex = '''-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
description = "Generic API Key"
regex = '''(?i)api[_-]?key\s*=\s*["'][A-Za-z0-9_\-]{16,}["']'''
tags = ["api", "custom"]
